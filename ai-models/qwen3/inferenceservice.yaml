apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    openshift.io/display-name: Qwen3-8B-FP8-dynamic
    serving.kserve.io/deploymentMode: RawDeployment
  labels:
    modelregistry.opendatahub.io/registered: "true"
    opendatahub.io/dashboard: "true"
  name: qwen3-8b-fp8-dynamic 
  namespace: models
spec:
  predictor:
    automountServiceAccountToken: false
    maxReplicas: 1
    minReplicas: 1
    model:
      args:
      - --max-model-len=1000
      - --gpu-memory-utilization=0.7
      - --swap-space=4
      - --enable-prefix-caching
      env:
      - name: PYTORCH_CUDA_ALLOC_CONF
        value: expandable_segments:True
      modelFormat:
        name: vLLM
      name: ""
      resources:
        limits:
          cpu: "20"
          memory: 105Gi
          nvidia.com/gpu: "1"
        requests:
          cpu: "20"
          memory: 105Gi
          nvidia.com/gpu: "1"
      runtime: vllm-cuda-runtime
      storageUri: oci://registry.redhat.io/rhelai1/modelcar-qwen3-8b-fp8-dynamic:1.5
    tolerations:
    - effect: NoSchedule
      key: nvidia.com/gpu
      operator: Exists
