apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: flan-t5-base
  namespace: models
spec:
  predictor:
    model:
      modelFormat:
        name: huggingface
      runtime: mlserver-huggingface
      storage:
        path: /mnt/models/flan-t5-base   # 👈 path inside container
    volumes:
      - name: model-storage
        persistentVolumeClaim:
          claimName: hf-pvc              # 👈 your EBS PVC
    volumeMounts:
      - name: model-storage
        mountPath: /mnt/models           # 👈 mount PVC here
