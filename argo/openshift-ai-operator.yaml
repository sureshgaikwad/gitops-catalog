apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openshift-ai-operator
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: https://github.com/sureshgaikwad/gitops-catalog.git   # your GitOps repo
    targetRevision: main
    path: operators/openshift-ai
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-operators
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
