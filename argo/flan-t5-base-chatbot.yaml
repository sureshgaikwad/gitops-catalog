apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: flan-t5-base-chatbot
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: https://github.com/sureshgaikwad/gitops-catalog.git   # your GitOps repo
    targetRevision: main
    path: ai-models/flan-t5-base
  destination:
    server: https://kubernetes.default.svc
    namespace: redhat-ods-applications
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
