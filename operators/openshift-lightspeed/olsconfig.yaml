apiVersion: ols.openshift.io/v1alpha1
kind: OLSConfig
metadata:
  name: cluster
  namespace: openshift-lightspeed
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true,Validate=false
  labels:
    app.kubernetes.io/component: ai-assistant
    app.kubernetes.io/instance: openshift-lightspeed
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/name: openshift-lightspeed
spec:
  llm:
    providers:
      - name: red_hat_openshift_ai
        type: rhoai_vllm
        url: "http://qwen-25-7b-predictor.models.svc.cluster.local:8080/v1"
        credentialsSecretRef:
          name: rhoai-api-keys
        models:
          - name: qwen-25-7b
            url: "http://qwen-25-7b-predictor.models.svc.cluster.local:8080/v1"
  ols:
    defaultProvider: red_hat_openshift_ai
    defaultModel: qwen-25-7b
    logLevel: INFO
