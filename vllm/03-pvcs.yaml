apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: semantic-router-models
  namespace: models
  labels:
    app: semantic-router
    component: storage
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  volumeMode: Filesystem
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: semantic-router-cache
  namespace: models
  labels:
    app: semantic-router
    component: storage
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  volumeMode: Filesystem
