apiVersion: v1
kind: ConfigMap
metadata:
  name: semantic-router-envoy-kserve-config
  namespace: models
  labels:
    app: semantic-router
    component: envoy
data:
  envoy.yaml: |
    static_resources:
      listeners:
      - name: listener_0
        address:
          socket_address:
            address: 0.0.0.0
            port_value: 8801
        filter_chains:
        - filters:
          - name: envoy.filters.network.http_connection_manager
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
              stat_prefix: ingress_http
              access_log:
              - name: envoy.access_loggers.stdout
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                  log_format:
                    text_format: "status=%RESPONSE_CODE% total_ms=%DURATION% upstream_ms=%RESP(x-envoy-upstream-service-time)% cluster=%UPSTREAM_CLUSTER% vsr=%REQ(x-vsr-destination-endpoint)% method=%REQ(:METHOD)% path=%REQ(:PATH)%\n"
              route_config:
                name: local_route
                virtual_hosts:
                - name: local_service
                  domains: ["*"]
                  routes:
                  - match:
                      path: "/v1/models"
                    route:
                      cluster: semantic_router_cluster
                      timeout: 300s
                  - match:
                      prefix: "/"
                    route:
                      cluster: vllm_dynamic_cluster
                      timeout: 300s
              http_filters:
              - name: envoy.filters.http.ext_proc
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.ext_proc.v3.ExternalProcessor
                  grpc_service:
                    envoy_grpc:
                      cluster_name: extproc_service
                  allow_mode_override: true
                  processing_mode:
                    request_header_mode: "SEND"
                    response_header_mode: "SEND"
                    request_body_mode: "BUFFERED"
                    response_body_mode: "BUFFERED"
                    request_trailer_mode: "SKIP"
                    response_trailer_mode: "SKIP"
                  failure_mode_allow: true
                  message_timeout: 300s
              - name: envoy.filters.http.router
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

      clusters:
      - name: extproc_service
        connect_timeout: 300s
        type: STATIC
        lb_policy: ROUND_ROBIN
        typed_extension_protocol_options:
          envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
            "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
            explicit_http_config:
              http2_protocol_options: {}
        load_assignment:
          cluster_name: extproc_service
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: 127.0.0.1
                    port_value: 50051

      - name: semantic_router_cluster
        connect_timeout: 300s
        type: STATIC
        lb_policy: ROUND_ROBIN
        load_assignment:
          cluster_name: semantic_router_cluster
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: 127.0.0.1
                    port_value: 8080

      - name: vllm_dynamic_cluster
        connect_timeout: 300s
        type: ORIGINAL_DST
        lb_policy: CLUSTER_PROVIDED
        original_dst_lb_config:
          use_http_header: true
          http_header_name: "x-vsr-destination-endpoint"

    admin:
      address:
        socket_address:
          address: "127.0.0.1"
          port_value: 19000
